<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم — أبي دجانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <style>
        /* LOGIN */
        .login-page {
            min-height: 100vh;
            background: var(--brown-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(200, 134, 10, 0.2);
        }

        .login-box h2 {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--brown-dark);
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .login-box p {
            color: var(--text-mid);
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--brown-dark);
            font-size: 0.9rem;
        }

        .form-control {
            border: 1.5px solid var(--cream-dark);
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--gold);
            box-shadow: none;
        }

        .login-err {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
        }

        .dash-nav {
            background: var(--brown-dark);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--gold);
        }

        .dash-nav span {
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            color: var(--cream);
            font-weight: 700;
        }

        .dash-nav button {
            background: transparent;
            border: 1.5px solid rgba(247, 242, 232, 0.3);
            color: var(--cream);
            padding: 0.35rem 1rem;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dash-nav button:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .dash-content {
            padding: 2.5rem 0;
            background: var(--cream);
            min-height: calc(100vh - 70px);
        }

        .tabs-bar {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid var(--cream-dark);
            padding-bottom: 0;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.75rem 1.5rem;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-mid);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--gold);
        }

        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ADD FORM */
        .add-form {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid rgba(58, 18, 0, 0.07);
            margin-bottom: 2rem;
        }

        .add-form h5 {
            font-weight: 700;
            color: var(--brown-dark);
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
            border-bottom: 2px solid var(--cream-dark);
            padding-bottom: 0.75rem;
        }

        /* ACHIEVEMENTS LIST */
        .ach-list-item {
            background: white;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            border: 1px solid rgba(58, 18, 0, 0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            transition: all 0.2s;
        }

        .ach-list-item:hover {
            border-color: var(--gold);
        }

        .ach-list-item h6 {
            font-weight: 700;
            color: var(--brown-dark);
            margin: 0 0 0.2rem;
            font-size: 0.95rem;
        }

        .ach-list-item p {
            color: var(--text-mid);
            font-size: 0.85rem;
            margin: 0;
        }

        .btn-delete {
            background: transparent;
            border: 1.5px solid #dc3545;
            color: #dc3545;
            padding: 0.35rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-delete:hover {
            background: #dc3545;
            color: white;
        }

        .alert-success-custom {
            background: rgba(200, 134, 10, 0.1);
            border: 1px solid var(--gold);
            color: var(--brown-dark);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    
    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="dash-nav">
            <span>لوحة التحكم — مدرسة أبي دجانة</span>
            <button onclick="doLogout()"><i class="bi bi-box-arrow-right me-1"></i>خروج</button>
        </div>

        <div class="dash-content">
            <div class="container">

                <!-- TABS -->
                <div class="tabs-bar mb-4">
                    <button class="tab-btn active" id="btn-achievements" onclick="showTab('achievements')">
                        <i class="bi bi-trophy-fill me-2"></i>إنجازات المدرسة
                    </button>
                    <button class="tab-btn" id="btn-videos" onclick="showTab('videos')">
                        <i class="bi bi-camera-video-fill me-2"></i>الفيديوهات
                    </button>
                    <button class="tab-btn" id="btn-teachers" onclick="showTab('teachers')">
                        <i class="bi bi-people-fill me-2"></i>المعلمون
                    </button>
                </div>

                <!-- TAB: ACHIEVEMENTS -->
                <div id="tab-achievements" class="tab-content">
                    <div class="row g-4">
                        <div class="col-lg-5">
                            <div class="add-form">
                                <h5><i class="bi bi-plus-circle-fill me-2" style="color: var(--gold);"></i>إضافة إنجاز
                                    جديد</h5>
                                <div class="alert-success-custom" id="ach-success">
                                    <i class="bi bi-check-circle-fill me-2"></i>تم إضافة الإنجاز بنجاح
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">عنوان الإنجاز</label>
                                    <input type="text" class="form-control" id="ach-title"
                                        placeholder="عنوان الإنجاز" />
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">الوصف</label>
                                    <textarea class="form-control" id="ach-desc" rows="3"
                                        placeholder="وصف الإنجاز"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">التاريخ</label>
                                    <input type="date" class="form-control" id="ach-date" />
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">صورة (اختياري)</label>
                                    <input type="file" class="form-control" id="ach-image" accept="image/*" />
                                </div>
                                <button class="btn-primary-custom w-100" onclick="addAchievement()">
                                    <i class="bi bi-plus-lg me-2"></i>إضافة
                                </button>
                            </div>
                        </div>
                        <div class="col-lg-7">
                            <div class="add-form">
                                <h5><i class="bi bi-list-ul me-2" style="color: var(--gold);"></i>الإنجازات الحالية</h5>
                                <div id="achievements-list">
                                    <div class="text-center py-3">
                                        <div class="spinner-border" style="color: var(--gold);" role="status"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TAB: VIDEOS -->
                <div id="tab-videos" class="tab-content" style="display:none;">
                    <div class="row g-4">
                        <div class="col-lg-5">
                            <div class="add-form">
                                <h5><i class="bi bi-plus-circle-fill me-2" style="color: var(--gold);"></i>إضافة فيديو
                                    جديد</h5>
                                <div class="alert-success-custom" id="vid-success">
                                    <i class="bi bi-check-circle-fill me-2"></i>تم إضافة الفيديو بنجاح
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">عنوان الفيديو</label>
                                    <input type="text" class="form-control" id="vid-title"
                                        placeholder="عنوان الفيديو" />
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">الوصف (اختياري)</label>
                                    <textarea class="form-control" id="vid-desc" rows="3"
                                        placeholder="وصف الفيديو"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">الفيديو (mp4)</label>
                                    <input type="file" class="form-control" id="vid-file" accept="video/mp4" />
                                </div>
                                <button class="btn-primary-custom w-100" onclick="addVideo()">
                                    <i class="bi bi-plus-lg me-2"></i>إضافة
                                </button>
                            </div>
                        </div>
                        <div class="col-lg-7">
                            <div class="add-form">
                                <h5><i class="bi bi-list-ul me-2" style="color: var(--gold);"></i>الفيديوهات الحالية
                                </h5>
                                <div id="videos-list">
                                    <div class="text-center py-3">
                                        <div class="spinner-border" style="color: var(--gold);" role="status"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- TAB: TEACHERS -->
           <!-- TAB: TEACHERS -->
<div id="tab-teachers" class="tab-content" style="display:none;">
  <div class="row g-4">
    <div class="col-lg-5">
      <div class="add-form">
        <h5><i class="bi bi-person-plus-fill me-2" style="color: var(--gold);"></i>إضافة معلم جديد</h5>
        <div class="alert-success-custom" id="teacher-success">
          <i class="bi bi-check-circle-fill me-2"></i>تم إضافة المعلم بنجاح
        </div>
        <div class="mb-3">
          <label class="form-label">الاسم الكامل</label>
          <input type="text" class="form-control" id="t-name" placeholder="اسم المعلم"/>
        </div>
        <div class="mb-3">
          <label class="form-label">المادة</label>
          <input type="text" class="form-control" id="t-subject" placeholder="مثال: رياضيات"/>
        </div>
        <div class="mb-3">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-control" id="t-email" placeholder="teacher@school.com"/>
        </div>
        <div class="mb-3">
          <label class="form-label">كلمة المرور المؤقتة</label>
          <input type="text" class="form-control" id="t-password" placeholder="باسورد مؤقت"/>
        </div>
        <div class="mb-3">
          <label class="form-label">نبذة <span style="font-size:0.8rem; color:var(--text-mid);">(اختياري)</span></label>
          <textarea class="form-control" id="t-bio" rows="2" placeholder="نبذة عن المعلم"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">رقم الجوال <span style="font-size:0.8rem; color:var(--text-mid);">(اختياري)</span></label>
          <input type="text" class="form-control" id="t-phone" placeholder="05xxxxxxxx"/>
        </div>
        <button class="btn-primary-custom w-100" onclick="addTeacher()">
          <i class="bi bi-plus-lg me-2"></i>إضافة
        </button>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="add-form">
        <h5><i class="bi bi-people-fill me-2" style="color: var(--gold);"></i>المعلمون المسجلون</h5>
        <div id="teachers-list">
          <div class="text-center py-3">
            <div class="spinner-border" style="color: var(--gold);" role="status"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
                   
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
